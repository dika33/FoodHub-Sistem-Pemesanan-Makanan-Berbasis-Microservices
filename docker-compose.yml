version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: foodhub_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${MYSQL_USER:-foodhub_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-foodhub_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - menu-service
      - order-service
    env_file:
      - .env

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env

  menu-service:
    build: ./menu-service
    container_name: menu-service
    ports:
      - "8002:8002"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8003:8003"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env

  frontend:
    build: ./frontend
    container_name: foodhub-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - api-gateway

volumes:
  mysql_data:
